apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: grafana-dev
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        # grafana image runs as uid/gid 472
        fsGroup: 472
        runAsUser: 472
        runAsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              # For production, replace with a valueFrom.secretKeyRef reference.
              value: admin
          readinessProbe:
            httpGet:
              path: /api/health
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: https
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-plugins
              mountPath: /var/lib/grafana/plugins
            - name: grafana-config
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: grafana-config
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: grafana-config
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards-provider.yaml
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: grafana-tls
              mountPath: /etc/grafana/certs
              readOnly: true
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc-storage
        - name: grafana-plugins
          persistentVolumeClaim:
            claimName: grafana-pvc-plugins
        - name: grafana-config
          configMap:
            name: grafana-config
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
        # TLS full chain + key + CA served by Grafana. Create with
        # ./certs/generate-certs.sh (self-signed, dev) or from your real
        # chain in production:
        #   kubectl -n grafana-dev create secret generic grafana-tls \
        #     --type=kubernetes.io/tls \
        #     --from-file=tls.crt=fullchain.crt \
        #     --from-file=tls.key=tls.key \
        #     --from-file=ca.crt=ca.crt
        - name: grafana-tls
          secret:
            secretName: grafana-tls
            defaultMode: 0440

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: grafana-dev
  labels:
    app: grafana
data:
  grafana.ini: |
    [server]
    root_url = %(protocol)s://%(domain)s:%(http_port)s/
    http_port = 3000

    [security]
    # Set the admin password via the GF_SECURITY_ADMIN_PASSWORD env var
    # (see the Deployment) rather than hard-coding it here.
    admin_user = admin

    [users]
    allow_sign_up = false

    [analytics]
    reporting_enabled = false
    check_for_updates = false

    [log]
    mode = console
    level = info

  # Auto-provision a default datasource. Edit or remove as needed.
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.grafana-dev.svc.cluster.local:9090
        isDefault: true
        editable: true

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: grafana-dev
  labels:
    app: grafana
data:
  grafana.ini: |
    [server]
    protocol = https
    domain = grafana-dev.example.com
    http_port = 3000
    root_url = https://grafana-dev.example.com:443/
    # TLS cert + key that Grafana serves on http_port. These paths must match
    # where the cert Secret is mounted in the Deployment
    # (the `grafana-tls` Secret -> /etc/grafana/certs).
    # PLACEHOLDERS -- create the Secret with your real cert/key (see README).
    cert_file = /etc/grafana/certs/tls.crt
    cert_key  = /etc/grafana/certs/tls.key
    # Optional CA bundle if you use a private CA:
    # ca_cert = /etc/grafana/certs/ca.crt

    [security]
    # Set the admin password via the GF_SECURITY_ADMIN_PASSWORD env var
    # (see the Deployment) rather than hard-coding it here.
    admin_user = admin

    [users]
    allow_sign_up = false

    [analytics]
    reporting_enabled = false
    check_for_updates = false

    [log]
    mode = console
    level = info

  # Auto-provision a default datasource. Edit or remove as needed.
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.grafana-dev.svc.cluster.local:9090
        isDefault: true
        editable: true

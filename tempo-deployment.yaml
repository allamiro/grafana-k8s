apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: grafana-dev
  labels:
    app: tempo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        # Scraped by Alloy -> the stack monitors itself.
        # Required for the official mixins (docs/meta-monitoring.md).
        prometheus.io/scrape: "true"
        prometheus.io/port: "3200"
      labels:
        app: tempo
    spec:
      securityContext:
        # tempo image runs as uid/gid 10001
        fsGroup: 10001
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: tempo
          # Pinned: the `latest` tag currently ships a 3.0 release candidate
          # whose config schema differs. Bump deliberately when 3.0 is stable.
          image: grafana/tempo:2.8.1
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/tempo/tempo.yaml
          ports:
            - name: http
              containerPort: 3200
            - name: grpc
              containerPort: 9096
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: tempo-data
              mountPath: /var/tempo
            - name: tempo-config
              mountPath: /etc/tempo
      volumes:
        - name: tempo-data
          persistentVolumeClaim:
            claimName: tempo-pvc-data
        - name: tempo-config
          configMap:
            name: tempo-config

# Alloy's built-in UI (pipeline graph, component health) + OTLP intake.
# In-cluster apps send traces to:
#   grpc: alloy.grafana-dev.svc.cluster.local:4317
#   http: http://alloy.grafana-dev.svc.cluster.local:4318
# Access the UI from your machine:
#   kubectl -n grafana-dev port-forward svc/alloy 12345:12345
#   open http://localhost:12345
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: grafana-dev
  labels:
    app: alloy
spec:
  type: ClusterIP
  selector:
    app: alloy
  ports:
    - name: http
      protocol: TCP
      port: 12345
      targetPort: http
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: otlp-http

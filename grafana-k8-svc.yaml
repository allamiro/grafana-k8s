apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: grafana-dev
  labels:
    app: grafana
spec:
  # ClusterIP keeps Grafana internal; reach it with `kubectl port-forward`.
  # Switch to LoadBalancer (e.g. on Tanzu/NSX) to get an external IP.
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http

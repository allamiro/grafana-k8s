apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: grafana-dev
  labels:
    app: grafana
spec:
  type: LoadBalancer
  # PLACEHOLDER IP -- CHANGE THIS to your environment's load balancer IP
  # (Tanzu/NSX/MetalLB). Remove the line to let the LB auto-assign one.
  loadBalancerIP: 10.0.0.100
  selector:
    app: grafana
  ports:
    - name: https
      protocol: TCP
      port: 443          # external port (TLS terminated at the LB)
      targetPort: http   # -> container port 3000

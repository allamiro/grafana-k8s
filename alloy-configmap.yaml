apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: grafana-dev
  labels:
    app: alloy
data:
  # Full Alloy config -- the single collector for the whole stack:
  #
  #   LOGS      every pod in every namespace -> Loki
  #   METRICS   cadvisor (per-container CPU/mem for all namespaces) and any
  #             pod annotated prometheus.io/scrape=true -> Prometheus
  #   TRACES    OTLP receiver (grpc 4317 / http 4318) -> Tempo
  #   PROFILES  pprof scrape (Alloy itself as the example) -> Pyroscope
  #
  # Apps OUTSIDE Kubernetes: run Alloy on that host with
  # examples/alloy-external.alloy pointed at these same backends.
  #
  # An "OPTIONAL COMPONENTS" section at the bottom carries every other common
  # Alloy component (k8s events, journald, syslog, node/kube-state metrics,
  # ServiceMonitors, blackbox, tail sampling, span metrics, eBPF/Java profiling,
  # Faro RUM, ...) commented out. Uncomment a block to enable it; each already
  # forwards to the loki.write / prometheus.remote_write / pyroscope.write sinks
  # defined in the active config above.
  config.alloy: |
    logging {
      level  = "info"
      format = "logfmt"
    }

    ///////////////////////////////////////////////////////////////////////
    // LOGS: all pods, all namespaces -> Loki
    ///////////////////////////////////////////////////////////////////////

    discovery.kubernetes "pods" {
      role = "pod"
      // Collects from EVERY namespace by default (cluster-wide RBAC in
      // alloy-rbac.yaml authorizes it). To restrict to specific namespaces,
      // uncomment and list them:
      //   namespaces {
      //     names = ["my-app", "team-a", "kube-system"]
      //   }
    }

    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "node"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.process.pods.receiver]
    }

    loki.process "pods" {
      stage.static_labels {
        values = {
          // CHANGE for production, e.g. cluster = "prod-tanzu-01"
          cluster = "docker-desktop",
        }
      }
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://loki.grafana-dev.svc.cluster.local:3100/loki/api/v1/push"
      }
    }

    ///////////////////////////////////////////////////////////////////////
    // METRICS (1/2): cadvisor -- container CPU/memory/network for every
    // pod in every namespace, scraped from the kubelet via the API server.
    ///////////////////////////////////////////////////////////////////////

    discovery.kubernetes "nodes" {
      role = "node"
    }

    discovery.relabel "cadvisor" {
      targets = discovery.kubernetes.nodes.targets

      rule {
        target_label = "__address__"
        replacement  = "kubernetes.default.svc.cluster.local:443"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/${1}/proxy/metrics/cadvisor"
      }
    }

    prometheus.scrape "cadvisor" {
      targets           = discovery.relabel.cadvisor.output
      scheme            = "https"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      scrape_interval   = "30s"

      tls_config {
        ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
      }

      forward_to = [prometheus.remote_write.default.receiver]
    }

    ///////////////////////////////////////////////////////////////////////
    // METRICS (2/2): application metrics -- any pod in ANY namespace
    // annotated with:
    //   prometheus.io/scrape: "true"
    //   prometheus.io/port:   "8080"        (your metrics port)
    //   prometheus.io/path:   "/metrics"    (optional, default /metrics)
    ///////////////////////////////////////////////////////////////////////

    discovery.relabel "metrics_pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        regex         = "true"
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
      }
      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
        regex         = "([^:]+)(?::\\d+)?;(\\d+)"
        replacement   = "$1:$2"
        target_label  = "__address__"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
      // job = "<namespace>/<app>" -- the convention the official Loki/Tempo/
      // Mimir mixins REQUIRE (they match job="<namespace>/<component>").
      // Without this, every mixin dashboard/alert renders empty with no error.
      // See docs/meta-monitoring.md.
      rule {
        source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_label_app"]
        separator     = "/"
        regex         = "(.+)"
        target_label  = "job"
      }
    }

    prometheus.scrape "pods" {
      targets         = discovery.relabel.metrics_pods.output
      scrape_interval = "30s"
      forward_to      = [prometheus.remote_write.default.receiver]
    }

    prometheus.remote_write "default" {
      endpoint {
        url = "http://prometheus.grafana-dev.svc.cluster.local:9090/api/v1/write"
        // send_exemplars defaults to TRUE in Alloy (upstream Prometheus
        // defaults it to false) -- nothing to do here. See docs/correlation.md.
      }

      // Mimir is OPTIONAL (grafana-dev-mimir/, backed by RustFS) and is NOT
      // deployed by the main README steps. Uncomment this endpoint AFTER
      // deploying it -- leaving it on without Mimir makes Alloy retry a
      // non-existent Service forever and grow its WAL.
      // endpoint {
      //   url = "http://mimir.grafana-dev.svc.cluster.local:9009/api/v1/push"
      // }

      external_labels = {
        // CHANGE for production, e.g. cluster = "prod-tanzu-01".
        // REQUIRED by every official mixin -- see docs/meta-monitoring.md.
        cluster = "docker-desktop",
      }
    }

    ///////////////////////////////////////////////////////////////////////
    // TRACES: apps send OTLP to alloy:4317 (grpc) / alloy:4318 (http),
    // Alloy forwards to Tempo.
    ///////////////////////////////////////////////////////////////////////

    otelcol.receiver.otlp "default" {
      grpc {
        endpoint = "0.0.0.0:4317"
      }
      http {
        endpoint = "0.0.0.0:4318"
      }
      output {
        traces = [otelcol.exporter.otlp.tempo.input]
      }
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "tempo.grafana-dev.svc.cluster.local:4317"
        tls {
          insecure = true
        }
      }
    }

    ///////////////////////////////////////////////////////////////////////
    // PROFILES: -> Pyroscope
    ///////////////////////////////////////////////////////////////////////

    pyroscope.write "default" {
      endpoint {
        url = "http://pyroscope.grafana-dev.svc.cluster.local:4040"
      }
    }

    // Profile Alloy itself (Go pprof endpoints) so Pyroscope has data
    // out of the box. Copy this block and point it at your own services
    // that expose /debug/pprof to profile them too.
    pyroscope.scrape "alloy_self" {
      targets = [
        {"__address__" = "localhost:12345", "service_name" = "alloy"},
      ]
      forward_to = [pyroscope.write.default.receiver]
    }

    ///////////////////////////////////////////////////////////////////////
    // OPTIONAL COMPONENTS -- NOT enabled. Uncomment (remove the leading //)
    // a block to turn it on. Grouped by signal. Each forwards to the same
    // loki.write.default / prometheus.remote_write.default /
    // pyroscope.write.default sinks already defined above.
    ///////////////////////////////////////////////////////////////////////

    // ===== LOGS (optional) =================================================

    // Kubernetes cluster events (like `kubectl get events`) -> Loki. Answers
    // "why was my pod OOMKilled / evicted / failing to schedule" without shell.
    // loki.source.kubernetes_events "cluster_events" {
    //   namespaces = []                       // empty = all namespaces
    //   forward_to = [loki.process.pods.receiver]
    // }

    // Push API: receive logs from external Alloy/Promtail/Loki clients. Point
    // them at http://alloy.grafana-dev.svc.cluster.local:3101/loki/api/v1/push
    // (expose port 3101 on the Alloy Deployment + Service).
    // loki.source.api "push" {
    //   http {
    //     listen_address = "0.0.0.0"
    //     listen_port    = 3101
    //   }
    //   forward_to = [loki.process.pods.receiver]
    // }

    // Syslog receiver (RFC5424/3164) -> Loki. For network gear, VMs, appliances.
    // loki.source.syslog "syslog" {
    //   listener {
    //     address  = "0.0.0.0:1514"
    //     protocol = "tcp"
    //     labels   = { job = "syslog" }
    //   }
    //   forward_to = [loki.process.pods.receiver]
    // }

    // systemd journal (node/system logs). Requires DaemonSet mode with the host
    // journal mounted at /var/log/journal.
    // loki.source.journal "journal" {
    //   max_age    = "12h"
    //   path       = "/var/log/journal"
    //   labels     = { job = "systemd-journal" }
    //   forward_to = [loki.process.pods.receiver]
    // }

    // Extra processing stages -- either add inside loki.process.pods above or
    // make a dedicated pipeline like this and forward pod logs through it.
    // loki.process "advanced" {
    //   stage.json   { expressions = { level = "level", msg = "message" } }
    //   stage.labels { values = { level = "" } }
    //   stage.drop   { expression = "(?i)(/healthz|/readyz|kube-probe)" }   // drop health-check noise
    //   stage.multiline { firstline = "^\\d{4}-\\d{2}-\\d{2}" }             // stitch stack traces
    //   stage.label_drop { values = ["pod_template_hash"] }                // cap cardinality
    //   forward_to = [loki.write.default.receiver]
    // }

    // PodLogs CRD selection (Grafana Agent Operator style) -> Loki.
    // loki.source.podlogs "crd" {
    //   forward_to = [loki.process.pods.receiver]
    // }

    // ===== METRICS (optional) ==============================================

    // kube-state-metrics (object state: deployments, pods, nodes, ...). Deploy
    // KSM first, then scrape its Service.
    // prometheus.scrape "kube_state_metrics" {
    //   targets = [{ __address__ = "kube-state-metrics.kube-system.svc.cluster.local:8080" }]
    //   scrape_interval = "30s"
    //   forward_to = [prometheus.remote_write.default.receiver]
    // }

    // Node/host metrics (CPU, mem, disk, filesystem, netdev) via the built-in
    // Unix (node) exporter. Best in DaemonSet mode so every node is covered.
    // prometheus.exporter.unix "node" { }
    // prometheus.scrape "node" {
    //   targets         = prometheus.exporter.unix.node.targets
    //   scrape_interval = "30s"
    //   forward_to      = [prometheus.remote_write.default.receiver]
    // }

    // Kubelet's OWN metrics (not cadvisor) -- volume stats, pod lifecycle.
    // discovery.relabel "kubelet" {
    //   targets = discovery.kubernetes.nodes.targets
    //   rule {
    //     target_label = "__address__"
    //     replacement  = "kubernetes.default.svc.cluster.local:443"
    //   }
    //   rule {
    //     source_labels = ["__meta_kubernetes_node_name"]
    //     regex         = "(.+)"
    //     target_label  = "__metrics_path__"
    //     replacement   = "/api/v1/nodes/${1}/proxy/metrics"
    //   }
    // }
    // prometheus.scrape "kubelet" {
    //   targets           = discovery.relabel.kubelet.output
    //   scheme            = "https"
    //   bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    //   tls_config { ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt" }
    //   forward_to = [prometheus.remote_write.default.receiver]
    // }

    // Prometheus Operator CRDs -- honor existing ServiceMonitors/PodMonitors so
    // you don't have to re-annotate workloads.
    // prometheus.operator.servicemonitors "svc" {
    //   forward_to = [prometheus.remote_write.default.receiver]
    // }
    // prometheus.operator.podmonitors "pods" {
    //   forward_to = [prometheus.remote_write.default.receiver]
    // }

    // Blackbox probing (HTTP/TCP/ICMP/DNS uptime + latency checks).
    // prometheus.exporter.blackbox "bb" {
    //   config = "modules:\n  http_2xx:\n    prober: http"
    //   target {
    //     name    = "grafana"
    //     address = "https://grafana.grafana-dev.svc.cluster.local"
    //     module  = "http_2xx"
    //   }
    // }
    // prometheus.scrape "blackbox" {
    //   targets    = prometheus.exporter.blackbox.bb.targets
    //   forward_to = [prometheus.remote_write.default.receiver]
    // }

    // Alloy's own internal metrics (self-observability).
    // prometheus.exporter.self "alloy" { }
    // prometheus.scrape "alloy_self_metrics" {
    //   targets    = prometheus.exporter.self.alloy.targets
    //   forward_to = [prometheus.remote_write.default.receiver]
    // }

    // ===== TRACES (optional) ===============================================

    // Recommended production processors between receiver and exporter: guard
    // memory, then batch. To enable, point otelcol.receiver.otlp's output at
    // otelcol.processor.memory_limiter.default.input instead of the exporter.
    // otelcol.processor.memory_limiter "default" {
    //   check_interval         = "1s"
    //   limit_percentage       = 75
    //   spike_limit_percentage = 15
    //   output { traces = [otelcol.processor.batch.default.input] }
    // }
    // otelcol.processor.batch "default" {
    //   output { traces = [otelcol.exporter.otlp.tempo.input] }
    // }

    // Tail sampling -- keep all error/slow traces, sample the rest.
    // otelcol.processor.tail_sampling "default" {
    //   policy { name = "errors",   type = "status_code",   status_code { status_codes = ["ERROR"] } }
    //   policy { name = "slow",     type = "latency",       latency { threshold_ms = 500 } }
    //   policy { name = "sample10", type = "probabilistic", probabilistic { sampling_percentage = 10 } }
    //   output { traces = [otelcol.exporter.otlp.tempo.input] }
    // }

    // Span metrics + service graph from traces (RED metrics) -> Prometheus.
    // NOTE: Tempo's metrics-generator already does this -- use one or the other.
    // otelcol.connector.spanmetrics "default" {
    //   output { metrics = [otelcol.exporter.prometheus.default.input] }
    // }
    // otelcol.connector.servicegraph "default" {
    //   output { metrics = [otelcol.exporter.prometheus.default.input] }
    // }
    // otelcol.exporter.prometheus "default" {
    //   forward_to = [prometheus.remote_write.default.receiver]
    // }

    // Route OTLP logs (not just traces) on to Loki.
    // otelcol.exporter.loki "default" {
    //   forward_to = [loki.write.default.receiver]
    // }

    // ===== PROFILES (optional) =============================================

    // Scrape any pod annotated for profiling (pyroscope.io/scrape=true,
    // pyroscope.io/port=<n>) -- mirrors the metrics-annotation pattern.
    // discovery.relabel "profiles_pods" {
    //   targets = discovery.kubernetes.pods.targets
    //   rule {
    //     source_labels = ["__meta_kubernetes_pod_annotation_pyroscope_io_scrape"]
    //     regex  = "true"
    //     action = "keep"
    //   }
    //   rule {
    //     source_labels = ["__address__", "__meta_kubernetes_pod_annotation_pyroscope_io_port"]
    //     regex        = "([^:]+)(?::\\d+)?;(\\d+)"
    //     replacement  = "$1:$2"
    //     target_label = "__address__"
    //   }
    // }
    // pyroscope.scrape "annotated" {
    //   targets    = discovery.relabel.profiles_pods.output
    //   forward_to = [pyroscope.write.default.receiver]
    // }

    // eBPF whole-node profiling (no app changes). DaemonSet + privileged.
    // pyroscope.ebpf "node" {
    //   forward_to = [pyroscope.write.default.receiver]
    // }

    // Java profiling via async-profiler (attach by PID). DaemonSet + privileged.
    // pyroscope.java "jvm" {
    //   targets    = discovery.relabel.profiles_pods.output
    //   forward_to = [pyroscope.write.default.receiver]
    // }

    // ===== FRONTEND / OTHER (optional) =====================================

    // Faro receiver: browser/mobile RUM -- JS errors, web vitals, frontend logs
    // & traces. Point the Faro Web SDK at alloy:12347/collect.
    // faro.receiver "frontend" {
    //   server {
    //     listen_address = "0.0.0.0"
    //     listen_port    = 12347
    //   }
    //   output {
    //     logs   = [loki.write.default.receiver]
    //     traces = [otelcol.exporter.otlp.tempo.input]
    //   }
    // }

    // Live debugging feed (inspect data flowing through components at :12345).
    // livedebugging {
    //   enabled = true
    // }

# Tempo is internal-only (Grafana queries it, Alloy pushes traces to it).
# In-cluster apps can also send OTLP straight to it:
#   grpc: tempo.grafana-dev.svc.cluster.local:4317
#   http: http://tempo.grafana-dev.svc.cluster.local:4318
# For direct access from your machine:
#   kubectl -n grafana-dev port-forward svc/tempo 3200:3200 4317:4317 4318:4318
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: grafana-dev
  labels:
    app: tempo
spec:
  type: ClusterIP
  selector:
    app: tempo
  ports:
    - name: http
      protocol: TCP
      port: 3200
      targetPort: http
    - name: grpc
      protocol: TCP
      port: 9096
      targetPort: grpc
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: otlp-http

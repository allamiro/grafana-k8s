# SNMP exporter targets.
#
# IMPORTANT: `targets` here are the DEVICES, not the exporter. The job's
# relabel_configs rewrite __address__ to the snmp_exporter and set
# instance = the device address.
#
# __param_module selects the SNMP module PER DEVICE -- this is what lets one
# 'snmp' job replace a job-per-module sprawl. Labels starting with __ are
# consumed during relabeling and dropped afterwards, so they add no series.

- targets:
    - '192.168.1.1'
    - '192.168.1.2'
  labels:
    # Comma-separated = scrape BOTH modules in one poll (verified supported by
    # snmp_exporter 0.30.1). `system` is REQUIRED for sysUpTime: if_mib only
    # walks 1.3.6.1.2.1.2 and .31.1.1, while sysUpTime is 1.3.6.1.2.1.1.3.
    # Without it the SNMPDeviceRebooted alert never fires.
    __param_module: if_mib,system   # interface counters + sysUpTime/sysName
    site: dc1
    role: access-switch

- targets:
    - '192.168.9.9'
  labels:
    __param_module: cisco_wlc,system  # different module, same job
    site: dc2
    role: wlc

# Devices needing a non-default SNMP community/auth use a separate module
# defined in snmp.yml, selected the same way:
# - targets: ['10.10.0.5']
#   labels:
#     __param_module: if_mib_v3
#     site: dc3

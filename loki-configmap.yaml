apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: grafana-dev
  labels:
    app: loki
data:
  # Full Loki config -- single-binary ("monolithic") mode with filesystem
  # storage on the PVC mounted at /loki. Suitable for Docker Desktop / dev;
  # for production scale, switch object_store to s3/gcs/azure.
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: info

    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      replication_factor: 1        # HA: raise to 3 with a multi-node ring + memberlist (see OPTIONAL block)
      ring:
        kvstore:
          store: inmemory          # HA: switch to "memberlist" for a clustered ring
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
        # --- S3 / RustFS object storage alternative (replace the filesystem block above) ---
        # s3:
        #   endpoint: rustfs.grafana-dev.svc.cluster.local:9000  # host:port of the S3 API
        #   bucketnames: loki-chunks                             # bucket that holds chunks/index
        #   access_key_id: ${RUSTFS_ACCESS_KEY}                  # injected from a Secret via env expansion
        #   secret_access_key: ${RUSTFS_SECRET_KEY}              # injected from a Secret via env expansion
        #   s3forcepathstyle: true                               # required for MinIO/RustFS-style endpoints
        #   insecure: false                                      # true = plain HTTP (dev only); false = TLS

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      delete_request_store: filesystem
      # retention_delete_delay: 2h        # grace period before chunks are physically deleted
      # retention_delete_worker_count: 150 # parallel workers doing retention deletes
      # compaction_interval: 10m           # how often the compactor runs
      # delete_request_store: s3           # store delete requests in object storage instead of filesystem

    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      # Keep logs for 31 days, then the compactor deletes them.
      retention_period: 744h
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
      max_query_series: 5000
      volume_enabled: true
      # --- Optional per-tenant limits (uncomment to enable) ---
      # per_stream_rate_limit: 3MB           # max ingest rate for a single stream
      # per_stream_rate_limit_burst: 15MB    # burst allowance for a single stream
      # max_streams_per_user: 10000          # cap active streams per tenant (0 = unlimited)
      # max_global_streams_per_user: 5000    # cluster-wide active stream cap per tenant
      # max_query_length: 721h               # reject queries spanning longer than this
      # max_query_lookback: 744h             # ignore data older than this in queries
      # split_queries_by_interval: 15m       # shard queries into sub-queries for parallelism
      # max_query_parallelism: 32            # max sub-queries run in parallel per query
      # max_entries_limit_per_query: 5000    # cap log lines returned by a single query
      # max_label_names_per_series: 15       # guard against label cardinality explosions

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    ruler:
      storage:
        type: local
        local:
          directory: /loki/rules
      rule_path: /loki/rules-temp
      enable_api: true
      # --- Optional ruler extras (uncomment to enable) ---
      # alertmanager_url: http://alertmanager.grafana-dev.svc.cluster.local:9093  # where alerting rules fire
      # enable_alertmanager_v2: true          # use the Alertmanager v2 API
      # ring:                                  # HA: shard rule groups across ruler replicas
      #   kvstore:
      #     store: memberlist
      # --- Ruler storage on S3 instead of local disk (replace storage.type above) ---
      # storage:
      #   type: s3
      #   s3:
      #     endpoint: rustfs.grafana-dev.svc.cluster.local:9000
      #     bucketnames: loki-ruler
      #     access_key_id: ${RUSTFS_ACCESS_KEY}
      #     secret_access_key: ${RUSTFS_SECRET_KEY}
      #     s3forcepathstyle: true
      #     insecure: false

    analytics:
      reporting_enabled: false

    # ===== OPTIONAL / ADVANCED (commented out -- uncomment to enable) =====
    # Reference blocks for commonly-needed Loki features not active above.
    # Move each block out of the comments (and off the leading "# ") to enable,
    # keeping the 4-space top-level indentation used throughout this config.
    #
    # --- storage_config: explicit chunk/index store (alternative to common.storage) ---
    # storage_config:
    #   tsdb_shipper:
    #     active_index_directory: /loki/tsdb-index      # local index being written
    #     cache_location: /loki/tsdb-cache              # local index query cache
    #     cache_ttl: 24h                                # how long to keep cached index files
    #   # boltdb_shipper is the legacy index type (pre-tsdb schemas):
    #   # boltdb_shipper:
    #   #   active_index_directory: /loki/boltdb-shipper-active
    #   #   cache_location: /loki/boltdb-shipper-cache
    #   filesystem:
    #     directory: /loki/chunks                       # local chunk store
    #   # S3 / RustFS chunk + index backend (replace filesystem above):
    #   # aws:
    #   #   s3: s3://${RUSTFS_ACCESS_KEY}:${RUSTFS_SECRET_KEY}@rustfs.grafana-dev.svc.cluster.local:9000/loki-chunks
    #   #   endpoint: rustfs.grafana-dev.svc.cluster.local:9000
    #   #   bucketnames: loki-chunks
    #   #   access_key_id: ${RUSTFS_ACCESS_KEY}
    #   #   secret_access_key: ${RUSTFS_SECRET_KEY}
    #   #   s3forcepathstyle: true
    #   #   insecure: false
    #
    # --- ingester: chunk lifecycle + write-ahead log ---
    # ingester:
    #   chunk_idle_period: 30m         # flush a stream's chunk after this idle time
    #   chunk_target_size: 1572864     # target compressed chunk size in bytes (~1.5MB)
    #   max_chunk_age: 2h              # force-flush a chunk once it reaches this age
    #   chunk_encoding: snappy         # chunk compression codec (snappy/gzip/lz4/zstd)
    #   wal:
    #     enabled: true                # replay unflushed data after a restart/crash
    #     dir: /loki/wal               # on-disk WAL location (should be on the PVC)
    #   lifecycler:
    #     ring:
    #       kvstore:
    #         store: memberlist        # HA: register ingesters in a shared ring
    #       replication_factor: 3
    #
    # --- querier: read-path concurrency ---
    # querier:
    #   max_concurrent: 8              # max queries a single querier runs at once
    #   engine:
    #     timeout: 3m                  # per-query execution timeout
    #
    # --- query_range / frontend: result caching + query sharding ---
    # query_range:
    #   align_queries_with_step: true  # snap query start/end to the step for better cache hits
    #   cache_results: true            # enable the results cache below
    #   max_retries: 5                 # retries per failed sub-query
    #   parallelise_shardable_queries: true
    #   results_cache:
    #     cache:
    #       embedded_cache:
    #         enabled: true
    #         max_size_mb: 100         # in-process cache size (use memcached for multi-node)
    #       # memcached:
    #       #   addresses: dns+memcached.grafana-dev.svc.cluster.local:11211
    # frontend:
    #   log_queries_longer_than: 5s    # log slow queries for tuning
    #   compress_responses: true       # gzip responses to the querier/client
    #   max_outstanding_per_tenant: 2048
    # frontend_worker:
    #   frontend_address: loki-query-frontend.grafana-dev.svc.cluster.local:9096
    #
    # --- memberlist: gossip ring for HA / multi-replica deployments ---
    # memberlist:
    #   join_members:
    #     - loki-memberlist.grafana-dev.svc.cluster.local:7946  # headless service listing all peers
    #   bind_port: 7946
    #   # abort_if_cluster_join_fails: false
    # ===== END OPTIONAL / ADVANCED =====

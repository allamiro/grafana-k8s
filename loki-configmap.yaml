apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: grafana-dev
  labels:
    app: loki
data:
  # Full Loki config -- single-binary ("monolithic") mode with filesystem
  # storage on the PVC mounted at /loki. Suitable for Docker Desktop / dev;
  # for production scale, switch object_store to s3/gcs/azure.
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: info

    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      delete_request_store: filesystem

    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      # Keep logs for 31 days, then the compactor deletes them.
      retention_period: 744h
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
      max_query_series: 5000
      volume_enabled: true

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    ruler:
      storage:
        type: local
        local:
          directory: /loki/rules
      rule_path: /loki/rules-temp
      enable_api: true

    analytics:
      reporting_enabled: false

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: grafana-dev
  labels:
    app: grafana
data:
  grafana.ini: |
    ##################### Grafana main config #####################
    # PLACEHOLDER URLS -- grafana.example.com is for the dev/simulated
    # environment. In production replace `domain` and `root_url` with the
    # real URL (or use https://<LB-IP>:443/ if you only have an IP).

    [paths]
    data = /var/lib/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning

    [server]
    protocol = https
    http_addr =
    http_port = 3000
    domain = grafana.example.com
    # If accessing by IP instead of DNS: root_url = https://10.0.0.100:443/
    root_url = https://grafana.example.com:443/
    # TLS: Grafana serves the FULL CHAIN (leaf first, then any intermediates)
    # from tls.crt. Both files come from the `grafana-tls` Secret mounted at
    # /etc/grafana/certs -- generated by ./certs/generate-certs.sh (dev)
    # or created from your real chain in production.
    #
    # NOTE: [server] has NO `ca_cert` option -- Grafana's HTTPS server takes
    # cert_file + cert_key only. Clients (browsers, curl) must trust the root
    # CA themselves; that is why the Secret still carries ca.crt, which the
    # bucket Job / Mimir style clients mount. Serving the chain is the server's
    # job; trusting the root is the client's.
    cert_file = /etc/grafana/certs/tls.crt
    cert_key  = /etc/grafana/certs/tls.key

    [security]
    # Admin user/password come from GF_SECURITY_ADMIN_USER /
    # GF_SECURITY_ADMIN_PASSWORD env vars in the Deployment.
    admin_user = admin
    cookie_secure = true
    cookie_samesite = lax

    [users]
    allow_sign_up = false
    allow_org_create = false
    default_theme = dark

    [auth.anonymous]
    enabled = false

    [analytics]
    reporting_enabled = false
    check_for_updates = false

    [unified_alerting]
    enabled = true

    [log]
    mode = console
    level = info

    ; ===== OPTIONAL / ADVANCED (commented out -- uncomment to enable) =====
    ; Grafana treats a `;` prefix as "default / disabled". Uncomment and edit
    ; the lines you need. Values shown are illustrative defaults/examples.

    ; [server]
    ; enforce_domain = false          ; redirect requests to the configured domain if the Host header differs
    ; serve_from_sub_path = false     ; serve Grafana under a sub-path of root_url (e.g. /grafana)
    ; router_logging = false          ; log every HTTP request the router handles (verbose; debugging only)

    ; [database]
    ; Use an external DB instead of the default embedded SQLite (for HA / multiple replicas).
    ; type = postgres                 ; postgres | mysql | sqlite3
    ; host = postgres.grafana-dev.svc.cluster.local:5432
    ; name = grafana                  ; database/schema name
    ; user = grafana                  ; DB username (prefer GF_DATABASE_USER env var)
    ; password =                      ; DB password (prefer GF_DATABASE_PASSWORD env var / secret)
    ; ssl_mode = require              ; postgres: disable|require|verify-ca|verify-full ; mysql: true|false|skip-verify

    ; [smtp]
    ; SMTP relay used to send alerting / invite emails.
    ; enabled = false
    ; host = smtp.example.com:587
    ; user =                          ; SMTP username
    ; password =                      ; SMTP password (prefer env var / secret)
    ; from_address = grafana@example.com
    ; from_name = Grafana
    ; skip_verify = false             ; skip TLS verification of the SMTP server cert

    ; [unified_alerting]
    ; enabled = true                  ; already enabled above; kept here for reference
    ; execute_alerts = true           ; evaluate/execute alert rules on this instance (set false on read-only replicas)

    ; [auth]
    ; disable_login_form = false      ; hide the username/password form (force SSO)
    ; oauth_auto_login = false        ; skip the login screen and go straight to the OAuth provider
    ; disable_signout_menu = false    ; hide the sign-out menu item

    ; [auth.generic_oauth]
    ; Generic OIDC / OAuth2 SSO (Keycloak, Okta, Azure AD, Google, etc.).
    ; enabled = false
    ; name = OAuth
    ; client_id = grafana
    ; client_secret =                 ; prefer env var / secret
    ; scopes = openid profile email
    ; auth_url = https://sso.example.com/realms/main/protocol/openid-connect/auth
    ; token_url = https://sso.example.com/realms/main/protocol/openid-connect/token
    ; api_url = https://sso.example.com/realms/main/protocol/openid-connect/userinfo
    ; allow_sign_up = true            ; auto-create Grafana users on first SSO login

    ; [auth.ldap]
    ; enabled = false
    ; config_file = /etc/grafana/ldap.toml   ; path to the LDAP mapping config
    ; allow_sign_up = true

    ; [auth.anonymous]
    ; enabled = false                 ; already set to false above; kept here for reference
    ; org_name = Main Org.            ; org that anonymous users belong to
    ; org_role = Viewer               ; role granted to anonymous users: Viewer|Editor|Admin

    ; [users]
    ; auto_assign_org = true          ; add new users to a default org automatically
    ; auto_assign_org_role = Viewer   ; default role for new users: Viewer|Editor|Admin
    ; default_theme = dark            ; already set above; kept here for reference (dark|light)
    ; viewers_can_edit = false        ; let Viewers edit (but not save) dashboards

    ; [security]
    ; cookie_secure = true            ; already set above; only send session cookie over HTTPS
    ; strict_transport_security = true               ; send HSTS response headers
    ; strict_transport_security_max_age_seconds = 86400
    ; content_security_policy = false ; enable CSP response headers
    ; content_security_policy_template =              ; custom CSP template when the above is enabled
    ; disable_gravatar = true         ; do not fetch user avatars from Gravatar

    ; [dataproxy]
    ; timeout = 30                    ; seconds before a datasource proxy request times out
    ; keep_alive_seconds = 30         ; keep-alive for outgoing datasource connections
    ; dialTimeout = 10                ; seconds to establish the datasource connection

    ; [rendering]
    ; Server-side image/PDF rendering (requires the grafana-image-renderer service).
    ; server_url = http://renderer.grafana-dev.svc.cluster.local:8081/render
    ; callback_url = https://grafana.example.com:443/   ; URL the renderer uses to call back into Grafana
    ; concurrent_render_request_limit = 30

    ; [feature_toggles]
    ; enable =                        ; space-separated feature toggles to turn on, e.g. "traceToMetrics publicDashboards"

    ; [log]
    ; mode = console file             ; already "console" above; can log to console, file, or syslog
    ; level = info                    ; already set above; debug|info|warn|error
    ; filters =                       ; per-logger level overrides, e.g. "rendering:debug"

  # Dashboard provider: loads every *.json in /var/lib/grafana/dashboards
  # (mounted from the grafana-dashboards ConfigMap) into the "Kubernetes"
  # folder, re-scanning every 30s.
  dashboards-provider.yaml: |
    apiVersion: 1
    providers:
      - name: kubernetes
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        allowUiUpdates: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false

  # Auto-provisioned datasources for the local stack.
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.grafana-dev.svc.cluster.local:9090
        isDefault: true
        editable: true
        jsonData:
          httpMethod: POST
          # METRIC -> TRACE. Click an exemplar diamond on a latency histogram
          # to open the trace that produced it.
          # `name` MUST match the exemplar's label KEY. Tempo's generator uses
          # `traceID` (its trace_id_label_name default) -- note this differs
          # from the OTel convention (`trace_id`). A mismatch fails SILENTLY.
          # Requires: Prometheus --enable-feature=exemplar-storage AND
          # Tempo send_exemplars: true. See docs/correlation.md.
          exemplarTraceIdDestinations:
            - name: traceID
              datasourceUid: tempo
              urlDisplayLabel: View Trace
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.grafana-dev.svc.cluster.local:3100
        editable: true
        jsonData:
          # LOG -> TRACE. Turns a trace ID in a log line into a link to Tempo.
          # matcherType `regex` (the default) matches the LOG LINE; capture
          # group 1 is the value. The `$${...}` double-$ is REQUIRED in
          # provisioning files -- a single $ is read as an env var.
          # See docs/correlation.md.
          derivedFields:
            - name: TraceID
              matcherType: regex
              matcherRegex: 'trace_?[Ii][Dd]["=:]+([a-fA-F0-9]+)'
              datasourceUid: tempo
              url: '$${__value.raw}'
              urlDisplayLabel: View Trace
          # Alternative for OTLP/structured-metadata logs where the trace ID is
          # a LABEL rather than in the line. matcherRegex then matches label
          # KEYS, so one pattern covers traceid + trace_id. Use ONE of the two
          # -- Grafana groups derived fields by `name` and keeps the first.
          # derivedFields:
          #   - name: TraceID
          #     matcherType: label
          #     matcherRegex: 'trace[_]?id'
          #     datasourceUid: tempo
          #     url: '$${__value.raw}'
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.grafana-dev.svc.cluster.local:3200
        editable: true
        jsonData:
          # Powers the service-graph view from Tempo's metrics generator.
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          # TRACE -> LOGS.
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            filterByTraceID: true
            tags:
              - key: service.name
                value: service_name
          # TRACE -> METRICS (Tempo's generated span metrics).
          # NOTE the metric names: it is `traces_spanmetrics_latency`, NOT
          # `traces_spanmetrics_duration_seconds` (renamed in Tempo 1.5).
          # `$$__tags` is the provisioning-escaped form of `$__tags`.
          tracesToMetrics:
            datasourceUid: prometheus
            spanStartTimeShift: '-2m'
            spanEndTimeShift: '2m'
            tags:
              - key: service.name
                value: service
            queries:
              - name: Request rate
                query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))'
              - name: p99 latency
                query: 'histogram_quantile(0.99, sum(rate(traces_spanmetrics_latency_bucket{$$__tags}[5m])) by (le))'
          # TRACE -> PROFILE. Config alone is not enough: the app must also be
          # instrumented with the Pyroscope+OTel bridge so spans carry the
          # `pyroscope.profile.id` attribute and profiles carry a `span_id`
          # pprof label. See docs/correlation.md.
          tracesToProfiles:
            datasourceUid: pyroscope
            profileTypeId: 'process_cpu:cpu:nanoseconds:cpu:nanoseconds'
            customQuery: false
            tags:
              - key: service.name
                value: service_name
      - name: Pyroscope
        type: grafana-pyroscope-datasource
        uid: pyroscope
        access: proxy
        url: http://pyroscope.grafana-dev.svc.cluster.local:4040
        editable: true
      # Mimir (grafana-dev-mimir/, RustFS-backed) -- Alloy dual-writes
      # metrics to Prometheus AND Mimir, so both are queryable.
      # Mimir is OPTIONAL and NOT deployed by the main README steps. Uncomment
      # AFTER deploying grafana-dev-mimir/ -- otherwise this datasource fails
      # its health check and any dashboard pointed at it errors.
      #
      # NOTE: if you ALREADY provisioned it once, commenting it out here does
      # NOT remove it -- Grafana keeps provisioned datasources in its database.
      # Delete it in the UI, or add:
      #   deleteDatasources:
      #     - name: Mimir
      #       orgId: 1
      # - name: Mimir
      #   type: prometheus
      #   uid: mimir
      #   access: proxy
      #   url: http://mimir.grafana-dev.svc.cluster.local:9009/prometheus
      #   editable: true
      #   jsonData:
      #     httpMethod: POST
      #     exemplarTraceIdDestinations:
      #       - name: traceID
      #         datasourceUid: tempo
      #         urlDisplayLabel: View Trace
      # ===== OPTIONAL EXTRA DATASOURCES (commented out -- uncomment to enable) =====
      # Loki, Tempo, Pyroscope and Mimir are already provisioned above as active
      # datasources; only the ones missing from this stack are shown here.
      #
      # Alertmanager -- view/manage alerts & silences from Grafana's Alerting UI.
      # - name: Alertmanager
      #   type: alertmanager
      #   uid: alertmanager
      #   access: proxy
      #   url: http://alertmanager.grafana-dev.svc.cluster.local:9093
      #   editable: true
      #   jsonData:
      #     # implementation: mimir (Mimir/Cortex) | cortex | prometheus (vanilla Alertmanager)
      #     implementation: prometheus
      #     handleGrafanaManagedAlerts: false
      #
      # Reference examples of the Loki/Tempo/Pyroscope datasources with the full
      # set of correlation options, in case you want to extend the active ones above.
      #
      # - name: Loki
      #   type: loki
      #   uid: loki
      #   access: proxy
      #   url: http://loki.grafana-dev.svc.cluster.local:3100
      #   editable: true
      #   jsonData:
      #     # Jump from a log line to the matching trace in Tempo.
      #     derivedFields:
      #       - name: TraceID
      #         matcherRegex: '"traceID":"(\w+)"'
      #         url: '$${__value.raw}'
      #         datasourceUid: tempo
      #
      # - name: Tempo
      #   type: tempo
      #   uid: tempo
      #   access: proxy
      #   url: http://tempo.grafana-dev.svc.cluster.local:3200
      #   editable: true
      #   jsonData:
      #     serviceMap:
      #       datasourceUid: prometheus
      #     # Trace -> Logs correlation (open Loki logs for a span).
      #     tracesToLogsV2:
      #       datasourceUid: loki
      #       spanStartTimeShift: '-1h'
      #       spanEndTimeShift: '1h'
      #       filterByTraceID: true
      #       filterBySpanID: false
      #     # Trace -> Metrics correlation (open Prometheus/Mimir metrics for a span).
      #     tracesToMetrics:
      #       datasourceUid: prometheus
      #       spanStartTimeShift: '-1h'
      #       spanEndTimeShift: '1h'
      #       queries:
      #         - name: 'Request rate'
      #           query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))'
      #
      # - name: Pyroscope
      #   type: grafana-pyroscope-datasource
      #   uid: pyroscope
      #   access: proxy
      #   url: http://pyroscope.grafana-dev.svc.cluster.local:4040
      #   editable: true

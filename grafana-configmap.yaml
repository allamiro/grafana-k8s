apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: grafana-dev
  labels:
    app: grafana
data:
  grafana.ini: |
    ##################### Grafana main config #####################
    # PLACEHOLDER URLS -- grafana.example.com is for the dev/simulated
    # environment. In production replace `domain` and `root_url` with the
    # real URL (or use https://<LB-IP>:443/ if you only have an IP).

    [paths]
    data = /var/lib/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning

    [server]
    protocol = https
    http_addr =
    http_port = 3000
    domain = grafana.example.com
    # If accessing by IP instead of DNS: root_url = https://10.0.0.100:443/
    root_url = https://grafana.example.com:443/
    # TLS: Grafana serves the FULL CHAIN (server cert + CA) from tls.crt,
    # with the CA chain also configured explicitly via ca_cert.
    # All three files come from the `grafana-tls` Secret mounted at
    # /etc/grafana/certs -- generated by ./certs/generate-certs.sh (dev)
    # or created from your real chain in production.
    cert_file = /etc/grafana/certs/tls.crt
    cert_key  = /etc/grafana/certs/tls.key
    ca_cert   = /etc/grafana/certs/ca.crt

    [security]
    # Admin user/password come from GF_SECURITY_ADMIN_USER /
    # GF_SECURITY_ADMIN_PASSWORD env vars in the Deployment.
    admin_user = admin
    cookie_secure = true
    cookie_samesite = lax

    [users]
    allow_sign_up = false
    allow_org_create = false
    default_theme = dark

    [auth.anonymous]
    enabled = false

    [analytics]
    reporting_enabled = false
    check_for_updates = false

    [unified_alerting]
    enabled = true

    [log]
    mode = console
    level = info

  # Dashboard provider: loads every *.json in /var/lib/grafana/dashboards
  # (mounted from the grafana-dashboards ConfigMap) into the "Kubernetes"
  # folder, re-scanning every 30s.
  dashboards-provider.yaml: |
    apiVersion: 1
    providers:
      - name: kubernetes
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        allowUiUpdates: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false

  # Auto-provisioned datasources for the local stack.
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.grafana-dev.svc.cluster.local:9090
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.grafana-dev.svc.cluster.local:3100
        editable: true
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.grafana-dev.svc.cluster.local:3200
        editable: true
        jsonData:
          # Powers the service-graph view from Tempo's metrics generator.
          serviceMap:
            datasourceUid: prometheus
          tracesToLogsV2:
            datasourceUid: loki
      - name: Pyroscope
        type: grafana-pyroscope-datasource
        uid: pyroscope
        access: proxy
        url: http://pyroscope.grafana-dev.svc.cluster.local:4040
        editable: true
      # If you deploy Mimir (grafana-dev-mimir/) instead of / alongside
      # Prometheus, uncomment:
      # - name: Mimir
      #   type: prometheus
      #   uid: mimir
      #   access: proxy
      #   url: http://mimir.grafana-dev.svc.cluster.local:9009/prometheus
      #   editable: true

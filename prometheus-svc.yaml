# Prometheus is internal-only (Alloy writes to it, Grafana queries it).
# For direct access to the Prometheus UI from your machine:
#   kubectl -n grafana-dev port-forward svc/prometheus 9090:9090
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: grafana-dev
  labels:
    app: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      protocol: TCP
      port: 9090
      targetPort: http

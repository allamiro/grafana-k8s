# Loki is internal-only (Grafana and Alloy reach it inside the cluster).
# For direct access from your machine:
#   kubectl -n grafana-dev port-forward svc/loki 3100:3100
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: grafana-dev
  labels:
    app: loki
spec:
  type: ClusterIP
  selector:
    app: loki
  ports:
    - name: http
      protocol: TCP
      port: 3100
      targetPort: http
    - name: grpc
      protocol: TCP
      port: 9096
      targetPort: grpc

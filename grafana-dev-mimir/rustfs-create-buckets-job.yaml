# One-shot Job: creates the S3 buckets Mimir needs (idempotent -- safe to
# re-apply). Runs after RustFS is up; retries until it succeeds.
apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-create-buckets
  namespace: grafana-dev
  labels:
    app: rustfs
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: rustfs-create-buckets
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-buckets
          image: amazon/aws-cli:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: secret-key
            - name: AWS_CA_BUNDLE
              value: /rustfs-ca/ca.crt
            - name: ENDPOINT
              value: https://rustfs.grafana-dev.svc.cluster.local:9000
          command:
            - /bin/sh
            - -c
            - |
              set -e
              for b in mimir-blocks mimir-ruler; do
                if aws --endpoint-url "$ENDPOINT" s3api head-bucket --bucket "$b" 2>/dev/null; then
                  echo "bucket $b already exists"
                else
                  aws --endpoint-url "$ENDPOINT" s3api create-bucket --bucket "$b"
                  echo "bucket $b created"
                fi
              done
          volumeMounts:
            - name: rustfs-ca
              mountPath: /rustfs-ca
              readOnly: true
      volumes:
        - name: rustfs-ca
          secret:
            secretName: rustfs-tls
            items:
              - key: ca.crt
                path: ca.crt

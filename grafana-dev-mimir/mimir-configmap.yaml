apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: grafana-dev
  labels:
    app: mimir
data:
  # Full Mimir config -- monolithic mode (target: all) with filesystem
  # storage on the PVC mounted at /data. Mimir is a horizontally-scalable
  # Prometheus-compatible metrics store; use it INSTEAD of the bundled
  # Prometheus when you need long-term/scale-out metrics.
  #
  # Endpoints:
  #   remote_write (Alloy) : http://mimir.grafana-dev.svc.cluster.local:9009/api/v1/push
  #   query (Grafana)      : http://mimir.grafana-dev.svc.cluster.local:9009/prometheus
  mimir.yaml: |
    target: all

    multitenancy_enabled: false

    server:
      http_listen_port: 9009
      grpc_listen_port: 9095
      log_level: info

    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/storage

    blocks_storage:
      storage_prefix: blocks
      bucket_store:
        sync_dir: /data/tsdb-sync
      tsdb:
        dir: /data/tsdb

    compactor:
      data_dir: /data/compactor
      sharding_ring:
        kvstore:
          store: memberlist

    distributor:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist

    ingester:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist
        replication_factor: 1

    store_gateway:
      sharding_ring:
        replication_factor: 1

    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/rules

    limits:
      # Keep metrics for 31 days (0 = keep forever).
      compactor_blocks_retention_period: 744h

    usage_stats:
      enabled: false

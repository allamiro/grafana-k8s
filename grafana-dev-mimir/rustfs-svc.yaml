# RustFS S3 endpoint (TLS): https://rustfs.grafana-dev.svc.cluster.local:9000
# Console UI from your machine:
#   kubectl -n grafana-dev port-forward svc/rustfs 9001:9001
#   open http://localhost:9001
apiVersion: v1
kind: Service
metadata:
  name: rustfs
  namespace: grafana-dev
  labels:
    app: rustfs
spec:
  type: ClusterIP
  selector:
    app: rustfs
  ports:
    - name: s3
      protocol: TCP
      port: 9000
      targetPort: s3
    - name: console
      protocol: TCP
      port: 9001
      targetPort: console

# EXAMPLE ONLY -- deliberately named *.example.yaml so that
#   kubectl apply -f grafana-dev-mimir/
# does NOT apply it and silently overwrite credentials you generated
# with ./grafana-dev-mimir/generate-rustfs-credentials.sh.
#
# Preferred:  ./grafana-dev-mimir/generate-rustfs-credentials.sh
# Or apply explicitly (dev placeholders, CHANGE THEM):
#   kubectl apply -f grafana-dev-mimir/rustfs-secret.example.yaml
#
# S3 credentials shared by RustFS (server) and Mimir (client).
# PLACEHOLDER VALUES -- change for production, e.g.:
#   openssl rand -base64 24
apiVersion: v1
kind: Secret
metadata:
  name: rustfs-credentials
  namespace: grafana-dev
  labels:
    app: rustfs
type: Opaque
stringData:
  access-key: rustfsadmin
  secret-key: rustfs-dev-secret-CHANGE-ME

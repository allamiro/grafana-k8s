# Alloy runs as a single-replica Deployment: on Docker Desktop there is only
# one node, and logs are tailed via the Kubernetes API (loki.source.kubernetes)
# so no per-node hostPath mounts are required.
# For a multi-node production cluster, convert this to a DaemonSet (or enable
# Alloy clustering) so log tailing scales with the node count.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: grafana-dev
  labels:
    app: alloy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:latest
          imagePullPolicy: IfNotPresent
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy/data
          ports:
            - name: http
              containerPort: 12345
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: alloy-config
              mountPath: /etc/alloy
            - name: alloy-data
              mountPath: /var/lib/alloy/data
      volumes:
        - name: alloy-config
          configMap:
            name: alloy-config
        - name: alloy-data
          emptyDir: {}

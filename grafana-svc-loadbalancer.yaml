# Grafana Service -- LoadBalancer variant.
# Use this when your cluster can hand out load-balancer IPs
# (Tanzu/NSX, MetalLB, cloud LBs).
#
# NOTE: apply EITHER this file OR grafana-svc-clusterip.yaml, not both --
# they define the same Service name with a different type.
#
# On Docker Desktop's built-in Kubernetes, LoadBalancer Services are exposed
# on localhost: after applying, Grafana is at https://localhost:443/
# (the loadBalancerIP field is ignored there).
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: grafana-dev
  labels:
    app: grafana
spec:
  type: LoadBalancer
  # PLACEHOLDER IP -- CHANGE THIS to your environment's load balancer IP
  # (Tanzu/NSX/MetalLB). Remove the line to let the LB auto-assign one.
  loadBalancerIP: 10.0.0.100
  selector:
    app: grafana
  ports:
    - name: https
      protocol: TCP
      port: 443           # external port
      targetPort: https   # -> container port 3000 (Grafana serves TLS)

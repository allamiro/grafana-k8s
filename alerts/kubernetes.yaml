# Kubernetes workloads.
#
# ⚠️ TWO DIFFERENT PREREQUISITES -- read before enabling:
#
# 1. The `kube_*` rules need **kube-state-metrics**, which this stack does NOT
#    deploy. Install KSM and scrape it (a commented prometheus.scrape block is
#    in alloy-configmap.yaml). Without it these never fire.
#
# 2. The `kubelet_volume_stats_*` rules need the **kubelet** scraped. Alloy
#    currently scrapes only the kubelet's cadvisor endpoint
#    (/metrics/cadvisor), NOT /metrics -- see the commented "kubelet" scrape in
#    alloy-configmap.yaml.
#
# The `container_*` rules work TODAY -- cadvisor is already scraped.
groups:
  - name: kubernetes-containers
    rules:
      # --- These work with the stack as shipped (cadvisor via Alloy) --------
      - alert: ContainerHighMemoryUsage
        expr: |
          container_memory_working_set_bytes{container!=""}
            / (container_spec_memory_limit_bytes{container!=""} > 0) * 100 > 90
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container }} near its memory limit"
          description: "{{ $labels.namespace }}/{{ $labels.pod }} at {{ $value | printf \"%.1f\" }}% of limit -- OOMKill risk."

      - alert: ContainerCPUThrottling
        expr: |
          sum by (namespace, pod, container) (rate(container_cpu_cfs_throttled_periods_total{container!=""}[5m]))
            / sum by (namespace, pod, container) (rate(container_cpu_cfs_periods_total{container!=""}[5m])) * 100 > 25
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container }} is CPU throttled"
          description: "{{ $value | printf \"%.1f\" }}% of periods throttled in {{ $labels.namespace }}/{{ $labels.pod }}."

  - name: kubernetes-state
    rules:
      # --- REQUIRE kube-state-metrics (NOT deployed here) ------------------
      - alert: KubePodCrashLooping
        expr: |
          max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) >= 1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"

      - alert: KubePodNotReady
        expr: |
          sum by (namespace, pod) (
            max by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown"})
            * on (namespace, pod) group_left(owner_kind)
              topk by (namespace, pod) (1, max by (namespace, pod, owner_kind) (kube_pod_owner{owner_kind!="Job"}))
          ) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready for 15m"

      - alert: KubeContainerOOMKilled
        expr: |
          increase(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container }} OOMKilled"
          description: "{{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled -- raise the memory limit or fix the leak."

      - alert: KubeDeploymentReplicasMismatch
        expr: |
          kube_deployment_spec_replicas != kube_deployment_status_replicas_available
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"

      - alert: KubeNodeNotReady
        expr: kube_node_status_condition{condition="Ready", status="true"} == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.node }} is not ready"

      - alert: KubeJobFailed
        expr: kube_job_failed > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed"

      - alert: KubeHPAMaxedOut
        expr: |
          kube_horizontalpodautoscaler_status_current_replicas
            == kube_horizontalpodautoscaler_spec_max_replicas
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "HPA {{ $labels.namespace }}/{{ $labels.horizontalpodautoscaler }} is maxed out"

  - name: kubernetes-storage
    rules:
      # --- REQUIRE the kubelet's /metrics endpoint to be scraped -----------
      # Every store in this stack (Loki/Tempo/Prometheus/Mimir/RustFS) is on an
      # RWO PVC. A full PVC is the most likely way this stack dies.
      - alert: KubePersistentVolumeFillingUp
        expr: |
          kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.10
          and kubelet_volume_stats_used_bytes > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} free"

      - alert: KubePersistentVolumeFillingUpPredicted
        expr: |
          kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.15
          and kubelet_volume_stats_used_bytes > 0
          and predict_linear(kubelet_volume_stats_available_bytes[6h], 4 * 24 * 3600) < 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} will fill within 4 days"

      - alert: KubePersistentVolumeInodesFillingUp
        expr: |
          kubelet_volume_stats_inodes_free / kubelet_volume_stats_inodes < 0.10
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is low on inodes"

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: grafana-dev
  labels:
    app: prometheus
data:
  # Prometheus acts as the metrics STORE for the stack: Alloy does all the
  # scraping (cadvisor, annotated pods, external hosts) and remote-writes
  # into Prometheus (--web.enable-remote-write-receiver on the Deployment).
  # Only Prometheus itself is scraped directly here.
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      external_labels:
        cluster: docker-desktop   # CHANGE for production

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
